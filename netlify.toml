[build]
  publish = "."
  command = "echo 'Static site - no build needed'"

# API and proxy redirects MUST come before catch-all
[[redirects]]
  from = "/api/*"
  to = "https://rawgen-t43n.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/proxy/*"
  to = "https://rawgen-t43n.onrender.com/proxy/:splat"
  status = 200
  force = true

# Catch-all MUST be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000"
